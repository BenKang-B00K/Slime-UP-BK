<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Slime UP!</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Rajdhani:wght@500;700&display=swap');

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #0a0a12;
            color: white;
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        #game-container {
            position: relative;
            width: 400px;
            height: 600px;
            box-shadow: 0 0 100px rgba(0, 0, 0, 0.8);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            overflow: hidden;
            background: #000;
        }

        canvas {
            display: block;
            pointer-events: auto;
        }

        /* 공통 오버레이 */

        .overlay-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .overlay-screen.hidden {
            display: none !important;
            opacity: 0;
            transform: scale(1.1);
        }

        /* 메인 타이틀 */

        .main-title {
            margin-top: 85px;
            text-align: center;
            animation: floating 3s ease-in-out infinite;
        }

        .main-title h1 {
            font-family: 'Press+Start+2P', cursive;
            font-size: 32px;
            color: #fff;
            text-shadow: 0 0 20px rgba(74, 144, 226, 0.8), 4px 4px 0px #2d5a27;
            margin: 0;
            letter-spacing: -2px;
        }

        .main-title p {
            font-size: 14px;
            color: #4a90e2;
            letter-spacing: 4px;
            margin-top: 10px;
            font-weight: 700;
            text-transform: uppercase;
        }

        /* 메인 버튼 그룹 */

        .main-menu-ui {
            margin-top: auto;
            margin-bottom: 60px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .btn-main {
            width: 220px;
            padding: 18px;
            font-family: 'Press+Start+2P', cursive;
            font-size: 14px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            pointer-events: auto;
        }

        #start-button {
            background: linear-gradient(135deg, #2ed573, #1dd1a1);
            color: white;
            box-shadow: 0 6px 0 #26af5c, 0 0 20px rgba(46, 213, 115, 0.4);
        }

        #start-button:hover { transform: translateY(-2px); box-shadow: 0 8px 0 #26af5c, 0 0 30px rgba(46, 213, 115, 0.6); }

        #shop-button {
            background: linear-gradient(135deg, #ffa502, #ff7f50);
            color: white;
            box-shadow: 0 6px 0 #e69500, 0 0 20px rgba(255, 165, 2, 0.4);
        }

        #shop-button:hover { transform: translateY(-2px); box-shadow: 0 8px 0 #e69500, 0 0 30px rgba(255, 165, 2, 0.6); }

        .btn-main:active { transform: translateY(4px); box-shadow: 0 2px 0 inherit; }

        /* 현재 스킨 라벨 */

        #current-skin-name-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 10px;
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 15px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
        }

        /* 인게임 최고 점수 (메인화면용) */

        .best-score-display {
            position: absolute;
            top: 20px;
            background: rgba(0, 0, 0, 0.5);
            padding: 8px 20px;
            border-radius: 30px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .best-score-display span {
            font-family: 'Press+Start+2P', cursive;
            font-size: 10px;
            color: #ffd700;
        }

        /* 애니메이션 */

        @keyframes floating {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        /* 인게임 UI 레이어 */

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            padding: 20px;
            box-sizing: border-box;
            z-index: 5;
        }

        .top-hud {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .score-box {
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 20px;
            border-radius: 15px;
            border-left: 4px solid #4a90e2;
        }

        #distance { font-family: 'Press+Start+2P', cursive; font-size: 18px; color: #fff; }

        #best-score { font-size: 12px; color: #aaa; margin-top: 4px; }

        #pause-button {
            width: 45px; height: 45px; background: rgba(0, 0, 0, 0.6);
            border: 2px solid rgba(255, 255, 255, 0.2); border-radius: 12px;
            color: white; font-family: 'Press+Start+2P', cursive; font-size: 16px;
            cursor: pointer; pointer-events: auto;
        }

        /* 상점 씬 (최종 수정) */

        #shop-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #0f0f1e 0%, #1a1a2e 100%);
            display: flex;
            flex-direction: column;
            z-index: 100;
            overflow: hidden;
            pointer-events: auto;
            touch-action: auto;
        }

        #shop-screen.hidden { display: none !important; }

        #shop-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px;
            background: rgba(15, 15, 30, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 101;
        }

        #shop-grid-container {
            flex-grow: 1;
            overflow-y: scroll;
            padding: 20px;
            touch-action: pan-y;
        }

        #shop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .skin-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .skin-card.locked {
            background: rgba(0, 0, 0, 0.25);
            border-color: rgba(255,255,255,0.05);
        }

        .skin-card.selected {
            border-color: #2ed573;
            background: rgba(46, 213, 115, 0.1);
            box-shadow: 0 0 20px rgba(46, 213, 115, 0.2);
            transform: translateY(-5px);
        }

        .card-preview-canvas { width: 64px; height: 64px; margin-bottom: 15px; filter: drop-shadow(0 8px 16px rgba(0,0,0,0.4)); }

        .card-name { font-family: 'Press+Start+2P', cursive; font-size: 9px; color: #fff; margin-bottom: 8px; }

        .card-lore { font-family: 'Rajdhani', sans-serif; font-size: 13px; color: #888; line-height: 1.3; text-align: center; height: 34px; overflow: hidden; margin-bottom: 10px; }

        .card-condition { font-family: 'Rajdhani', sans-serif; font-size: 11px; font-weight: 700; background: rgba(255, 255, 255, 0.05); padding: 4px 12px; border-radius: 20px; color: #ffa502; }

        .card-btn {
            border: none; border-radius: 20px; cursor: pointer;
            font-family: 'Press Start 2P', cursive; font-size: 8px;
            padding: 6px 14px; transition: all 0.2s; margin-top: auto;
        }

        .btn-equip { background: #2ed573; color: #111; }

        .btn-equip:hover { background: #26c465; transform: scale(1.05); }

        .btn-equipped { background: rgba(46,213,115,0.2); color: #2ed573; border: 1px solid #2ed573; cursor: default; }

        .btn-unlock { background: linear-gradient(135deg, #f6b93b, #e55039); color: #fff; }

        .btn-unlock:hover { filter: brightness(1.1); transform: scale(1.05); }

        #btn-close-shop {
            background: #ff4757; color: white; border: none; padding: 10px 20px;
            font-family: 'Press+Start+2P', cursive; font-size: 10px; border-radius: 8px;
        }

        .hint { margin-top: 20px; font-size: 12px; color: rgba(255,255,255,0.4); text-align: center; font-family: 'Rajdhani', sans-serif; font-weight: 500; }

        /* ===== 일시정지 버튼 스타일 ===== */

        .btn-restart {
            width: 210px;
            padding: 16px;
            font-family: 'Press Start 2P', cursive;
            font-size: 11px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.12s, box-shadow 0.12s;
            background: rgba(255,255,255,0.12);
            color: white;
            box-shadow: 0 5px 0 rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.15);
            margin: 6px 0;
        }

        .btn-restart:hover  { transform: translateY(-2px); background: rgba(255,255,255,0.18); }

        .btn-restart:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,0.4); }

        /* ===== 게임 오버 화면 ===== */

        /* hidden을 display:none 대신 opacity 페이드로 처리 (애니메이션 가능) */

        #game-over-screen {
            background: linear-gradient(180deg, rgba(45,0,5,0.97) 0%, rgba(8,0,2,0.99) 100%);
            justify-content: center;
            transition: opacity 0.35s ease, transform 0.35s ease;
        }

        #game-over-screen::before {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.07) 3px, rgba(0,0,0,0.07) 4px);
            pointer-events: none;
        }

        #game-over-screen.hidden {
            display: flex !important;
            opacity: 0 !important;
            pointer-events: none !important;
            transform: scale(1.04) !important;
        }

        .gameover-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            padding: 40px 30px 0;
            box-sizing: border-box;
            position: relative;
            z-index: 1;
        }

        #game-over-screen:not(.hidden) .gameover-content {
            animation: gameoverIn 0.45s cubic-bezier(0.34, 1.4, 0.64, 1) both;
        }

        @keyframes gameoverIn {
            from { opacity: 0; transform: translateY(-28px) scale(0.92); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        .gameover-title {
            font-family: 'Press Start 2P', cursive;
            font-size: 36px;
            color: #ff2d55;
            text-align: center;
            margin: 0 0 28px;
            line-height: 1.4;
            text-shadow:
                0 0 24px rgba(255,45,85,0.85),
                3px 3px 0px #6a001a,
                0 0 55px rgba(255,45,85,0.3);
            letter-spacing: -1px;
        }

        .gameover-score-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 22px 36px;
            text-align: center;
            width: 100%;
            max-width: 270px;
            margin-bottom: 22px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.07);
        }

        .gameover-score-label {
            font-family: 'Press Start 2P', cursive;
            font-size: 8px;
            color: rgba(255,255,255,0.3);
            letter-spacing: 3px;
            margin-bottom: 10px;
        }

        .gameover-score-value {
            font-family: 'Press Start 2P', cursive;
            font-size: 38px;
            color: #ff4757;
            line-height: 1;
            margin-bottom: 14px;
            text-shadow: 0 0 18px rgba(255,71,87,0.5);
        }

        .gameover-best-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 15px;
            font-weight: 700;
            color: rgba(255,255,255,0.38);
        }

        .gameover-best-label {
            letter-spacing: 2px;
            font-size: 13px;
        }

        .new-record-badge {
            display: none;
            margin-top: 14px;
            background: linear-gradient(135deg, #ffd700, #ff9500);
            color: #1a0800;
            font-family: 'Press Start 2P', cursive;
            font-size: 8px;
            padding: 8px 18px;
            border-radius: 20px;
            box-shadow: 0 4px 18px rgba(255,200,0,0.55);
        }

        .new-record-badge.show-badge {
            display: inline-block;
            animation: badgePop 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s both;
        }

        @keyframes badgePop {
            from { transform: scale(0) rotate(-12deg); opacity: 0; }
            to   { transform: scale(1) rotate(0deg);  opacity: 1; }
        }

        .gameover-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 260px;
            margin-bottom: 6px;
        }

        .btn-gameover {
            width: 100%;
            padding: 16px;
            font-family: 'Press Start 2P', cursive;
            font-size: 12px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.12s, box-shadow 0.12s;
            letter-spacing: 0.5px;
        }

        .btn-try-again {
            background: linear-gradient(135deg, #2ed573, #1dd1a1);
            color: white;
            box-shadow: 0 5px 0 #1a9e5a, 0 0 20px rgba(46,213,115,0.3);
        }

        .btn-try-again:hover  { transform: translateY(-2px); box-shadow: 0 7px 0 #1a9e5a, 0 0 30px rgba(46,213,115,0.5); }

        .btn-try-again:active { transform: translateY(3px);  box-shadow: 0 2px 0 #1a9e5a; }

        .btn-main-menu-go {
            background: rgba(255,255,255,0.07);
            color: rgba(255,255,255,0.55);
            border: 1px solid rgba(255,255,255,0.12);
            box-shadow: 0 5px 0 rgba(0,0,0,0.35);
        }

        .btn-main-menu-go:hover  { background: rgba(255,255,255,0.13); transform: translateY(-1px); }

        .btn-main-menu-go:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,0.35); }
    </style>
  <script type="module" crossorigin src="/Slime-UP-BK/assets/index-g2d71yXT.js"></script>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <!-- 인게임 HUD -->
        <div id="ui-layer">
            <div class="top-hud">
                <div class="score-box">
                    <div id="distance">0.0m</div>
                    <div id="best-score">Best: 0.0m</div>
                    <div id="hud-gold" style="font-size:11px;color:#FFD700;margin-top:4px;font-family:'Press Start 2P',cursive;">🪙 0</div>
                </div>
                <button id="pause-button">||</button>
            </div>
        </div>

        <!-- 메인 화면 -->
        <div id="start-screen" class="overlay-screen">
            <div class="main-title">
                <h1>Slime UP!</h1>
            </div>
            
            <div class="main-menu-ui">
                <div id="current-skin-name-label">Greenie</div>
                <div style="font-family:'Press Start 2P',cursive;font-size:11px;color:#FFD700;background:rgba(0,0,0,0.4);padding:6px 18px;border-radius:20px;border:1px solid rgba(255,215,0,0.25);margin-bottom:2px;">🪙 <span id="menu-gold">0</span></div>
                <button id="start-button" class="btn-main">START</button>
                <button id="shop-button" class="btn-main">SHOP</button>
                
                <div class="hint">
                    ARROWS to Move • SPACE to Jump
                </div>
            </div>
        </div>

        <!-- 스킨 상점 -->
        <div id="shop-screen" class="hidden">
            <div id="shop-header">
                <div style="display: flex; align-items: baseline; gap: 10px;">
                    <h2 style="margin: 0; font-family: 'Press+Start+2P'; font-size: 14px;">SKIN SHOP</h2>
                    <span id="total-skins-count" style="font-size: 12px; color: #4a90e2; font-weight: 700;">0 SKINS</span>
                </div>
                <div style="display:flex;align-items:center;gap:12px;">
                    <span id="shop-gold" style="font-family:'Press Start 2P',cursive;font-size:10px;color:#FFD700;">🪙 0</span>
                    <button id="btn-close-shop">CLOSE</button>
                </div>
            </div>
            <div id="shop-grid-container">
                <div id="shop-grid"></div>
            </div>
        </div>

        <!-- 일시정지 -->
        <div id="pause-screen" class="overlay-screen hidden" style="background: rgba(0,0,0,0.8); backdrop-filter: blur(5px);">
            <h2 style="font-family: 'Press+Start+2P';">PAUSED</h2>
            <button id="resume-button" class="btn-restart">RESUME</button>
            <button id="restart-button-pause" class="btn-restart" style="background: #ffa502; box-shadow: 0 5px #e69500;">RESTART</button>
        </div>

        <!-- 게임 오버 -->
        <div id="game-over-screen" class="overlay-screen hidden">
            <div class="gameover-content">
                <h1 class="gameover-title">GAME<br>OVER</h1>

                <div class="gameover-score-card">
                    <div class="gameover-score-label">DISTANCE</div>
                    <div class="gameover-score-value"><span id="final-distance">0.0m</span></div>
                    <div class="gameover-best-row">
                        <span class="gameover-best-label">BEST</span>
                        <span id="gameover-best-value">0.0m</span>
                    </div>
                    <div class="gameover-best-row" style="margin-top:10px;color:#FFD700;">
                        <span style="font-size:16px;">🪙</span>
                        <span style="font-family:'Press Start 2P',cursive;font-size:13px;" id="gameover-gold-earned">+0 GOLD</span>
                    </div>
                    <div id="new-record-badge" class="new-record-badge">🏆 NEW RECORD!</div>
                </div>

                <div class="gameover-buttons">
                    <button id="try-again-button" class="btn-gameover btn-try-again">▶ TRY AGAIN</button>
                    <button id="restart-button" class="btn-gameover btn-main-menu-go">↩ MAIN MENU</button>
                </div>

                <p class="hint">SPACE · TAP to try again</p>
            </div>
        </div>
    </div>

</body>
</html>
